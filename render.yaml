services:
  - type: web
    name: research-rag-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: research-rag-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
      - key: ENVIRONMENT
        value: production

databases:
  - name: research-rag-db
    databaseName: researchrag
    user: researchrag
    plan: free
